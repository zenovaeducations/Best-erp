<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenova Educations - Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8ff;
padding-bottom:90px;
}

.header{
background:#0b3d91;
color:white;
padding:20px;
border-radius:0 0 25px 25px;
}

.profile{
display:flex;
align-items:center;
gap:15px;
}

.profile img{
width:65px;
height:65px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
}

.container{
padding:15px;
}

.card{
background:white;
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.card h3{
color:#0b3d91;
margin-bottom:10px;
}

.stat{
font-size:28px;
font-weight:700;
color:#0b3d91;
}

.session{
border:1px solid #eee;
padding:15px;
border-radius:12px;
margin-bottom:12px;
}

.session h4{
margin-bottom:5px;
}

.joinBtn{
background:#0b3d91;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.saveBtn{
background:#0b3d91;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
margin-top:15px;
cursor:pointer;
}

input,select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:10px;
margin-top:10px;
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px;
box-shadow:0 -5px 15px rgba(0,0,0,.1);
}

.navBtn{
background:none;
border:none;
font-size:15px;
font-weight:600;
color:#0b3d91;
cursor:pointer;
}

.page{
display:none;
}

.active{
display:block;
}

.badge{
padding:8px 14px;
background:#0b3d91;
color:white;
border-radius:30px;
display:inline-block;
font-size:14px;
}

</style>
</head>
<body>

<div class="header">

<div class="profile">

<img id="photo">

<div>
<h2 id="studentName">Student</h2>
<p id="studentEmail"></p>
</div>

</div>

</div>

<div class="container">

<!-- HOME -->

<div id="homePage" class="page active">

<div class="card">
<h3>Program Day</h3>
<div class="stat" id="programDay">Day 1</div>
</div>

<div class="card">
<h3>Attendance Percentage</h3>
<div class="stat" id="attendancePercent">0%</div>
</div>

<div class="card">
<h3>Current Date</h3>
<div id="currentDate"></div>
</div>

<div class="card">
<h3>Current Session Status</h3>
<span class="badge" id="sessionStatus">
No Active Session
</span>
</div>

<div class="card">
<h3>Upcoming Sessions</h3>
<div id="upcomingSessions"></div>
</div>

</div>

<!-- SESSIONS -->

<div id="sessionsPage" class="page">

<div class="card">
<h3>My Sessions</h3>
<div id="sessionContainer"></div>
</div>

</div>

<!-- PROFILE -->

<div id="profilePage" class="page">

<div class="card">

<h3>Student Profile</h3>

<input type="file" id="profileImage">

<input type="text" id="nameInput" placeholder="Name">

<input type="text" id="registerInput" placeholder="Register Number">

<input type="text" id="mobileInput" placeholder="Mobile Number">

<select id="courseInput">
<option value="">Select Course</option>
<option>1st PUC</option>
<option>2nd PUC</option>
</select>

<button class="saveBtn" id="saveProfile">
Save Profile
</button>

</div>

</div>

</div>

<div class="bottomNav">
<button class="navBtn" onclick="showPage('homePage')">Home</button>
<button class="navBtn" onclick="showPage('sessionsPage')">Sessions</button>
<button class="navBtn" onclick="showPage('profilePage')">Profile</button>
</div>

<script type="module">

import {
auth,
db,
storage
} from "./firebase.js";

import {
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
setDoc,
getDoc,
updateDoc,
collection,
query,
where,
onSnapshot,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
ref,
uploadBytes,
getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

let currentUser;
let studentData={};

window.showPage=(id)=>{

document.querySelectorAll('.page')
.forEach(page=>page.classList.remove('active'));

document.getElementById(id)
.classList.add('active');

}

onAuthStateChanged(auth,async(user)=>{

if(!user){
location.href="index.html";
return;
}

currentUser=user;

document.getElementById("studentName").innerText=user.displayName;
document.getElementById("studentEmail").innerText=user.email;
document.getElementById("photo").src=user.photoURL;

await loadProfile();
loadSessions();
loadAttendance();
loadProgramDay();

await updateDoc(
doc(db,"students",user.uid),
{
isOnline:true,
lastSeen:Date.now()
}
);

});

async function loadProfile(){

const snap=await getDoc(
doc(db,"students",currentUser.uid)
);

if(snap.exists()){

studentData=snap.data();

nameInput.value=studentData.name || "";
registerInput.value=studentData.registerNumber || "";
mobileInput.value=studentData.mobileNumber || "";
courseInput.value=studentData.course || "";

if(studentData.photo){
photo.src=studentData.photo;
}

}

}

saveProfile.addEventListener("click",async()=>{

let imageUrl=studentData.photo || currentUser.photoURL;

const file=profileImage.files[0];

if(file){

const storageRef=ref(
storage,
`students/${currentUser.uid}`
);

await uploadBytes(storageRef,file);

imageUrl=await getDownloadURL(storageRef);

}

await setDoc(
doc(db,"students",currentUser.uid),
{
uid:currentUser.uid,
name:nameInput.value,
registerNumber:registerInput.value,
mobileNumber:mobileInput.value,
course:courseInput.value,
email:currentUser.email,
photo:imageUrl,
isOnline:true,
lastSeen:Date.now()
},
{merge:true}
);

alert("Profile Updated");

});

function loadSessions(){

onSnapshot(
collection(db,"sessions"),
(snapshot)=>{

sessionContainer.innerHTML="";
upcomingSessions.innerHTML="";

snapshot.forEach((docu)=>{

const s=docu.data();

if(
s.batch==="All Students" ||
s.batch===courseInput.value
){

sessionContainer.innerHTML+=`

<div class="session">

<h4>${s.title}</h4>

<p>${s.description}</p>

<p>${s.date}</p>

<p>${s.startTime} - ${s.endTime}</p>

<button class="joinBtn"
onclick="joinSession('${docu.id}',
'${s.title}',
'${s.batch}')">
Join Session
</button>

</div>

`;

upcomingSessions.innerHTML+=`
<div>${s.title} - ${s.date}</div>
`;

}

});

});

}

window.joinSession=async(
sessionId,
sessionTitle,
batch
)=>{

try{

const screenStream=
await navigator.mediaDevices.getDisplayMedia({
video:true,
audio:false
});

await updateDoc(
doc(db,"students",currentUser.uid),
{
isSharing:true
}
);

await addDoc(
collection(db,"attendance"),
{
studentId:currentUser.uid,
studentName:nameInput.value || currentUser.displayName,
sessionId,
sessionTitle,
batch,
joinedAt:Date.now(),
present:true
}
);

const peerConnection=
new RTCPeerConnection();

screenStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,screenStream);
});

const callDoc=await addDoc(
collection(db,"calls"),
{
studentId:currentUser.uid,
createdAt:serverTimestamp()
}
);

const offer=
await peerConnection.createOffer();

await peerConnection.setLocalDescription(offer);

await updateDoc(callDoc,{
offer:{
type:offer.type,
sdp:offer.sdp
}
});

alert("Screen Sharing Started");

screenStream.getVideoTracks()[0]
.onended=async()=>{

await updateDoc(
doc(db,"students",currentUser.uid),
{
isSharing:false
}
);

};

}
catch(err){

console.log(err);

}

}

function loadAttendance(){

onSnapshot(
query(
collection(db,"attendance"),
where("studentId","==",auth.currentUser?.uid || "x")
),
(snapshot)=>{

let total=snapshot.size;
let present=0;

snapshot.forEach(()=>{
present++;
});

let percent=
total===0 ? 0 :
Math.round((present/total)*100);

attendancePercent.innerText=
percent+"%";

});

}

function loadProgramDay(){

onSnapshot(
doc(db,"settings","program"),
(snapshot)=>{

if(!snapshot.exists()) return;

const data=snapshot.data();

const start=
new Date(data.startDate);

const today=
new Date();

const diff=
Math.floor(
(today-start)/(1000*60*60*24)
);

programDay.innerText=
"Day "+(diff+1);

});

}

currentDate.innerText=
new Date().toLocaleDateString(
'en-IN',
{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
}
);

window.addEventListener(
"beforeunload",
async()=>{

try{
await updateDoc(
doc(db,"students",currentUser.uid),
{
isOnline:false,
isSharing:false,
lastSeen:Date.now()
}
);
}catch(e){}

});

</script>

</body>
</html>
