<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zenova Teacher Dashboard</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
box-sizing:border-box;
}

button{
padding:10px 15px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
border-radius:6px;
}

.deleteBtn{
background:red;
margin-top:10px;
}

.sessionCard{
border:1px solid #ddd;
padding:15px;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Create Session</h2>

<input id="title" placeholder="Session Title">

<input id="date" type="date">

<input id="startTime" type="time">

<input id="endTime" type="time">

<textarea
id="description"
placeholder="Description">
</textarea>

<button onclick="createSession()">
Create Session
</button>

</div>

<div class="card">

<h2>All Sessions</h2>

<div id="sessionList"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
orderBy,
query
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAkuoUAAr7zEQICxlnimpz1XUFKJA3hPA8",
authDomain: "best-f6d59.firebaseapp.com",
projectId: "best-f6d59",
storageBucket: "best-f6d59.firebasestorage.app",
messagingSenderId: "422817936552",
appId: "1:422817936552:web:6d8bfeb0efab2e6302fe9d",
measurementId: "G-QVZZK9T59X"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

window.createSession = async () => {

const title =
document.getElementById("title").value;

const date =
document.getElementById("date").value;

const startTime =
document.getElementById("startTime").value;

const endTime =
document.getElementById("endTime").value;

const description =
document.getElementById("description").value;

if(!title || !date || !startTime || !endTime){
alert("Fill all fields");
return;
}

await addDoc(
collection(db,"sessions"),
{
title,
date,
startTime,
endTime,
description,
createdAt:new Date().toISOString()
}
);

alert("Session Created");

document.getElementById("title").value="";
document.getElementById("date").value="";
document.getElementById("startTime").value="";
document.getElementById("endTime").value="";
document.getElementById("description").value="";

loadSessions();

};

window.deleteSession = async(id)=>{

if(!confirm("Delete Session?")) return;

await deleteDoc(
doc(db,"sessions",id)
);

loadSessions();

};

async function loadSessions(){

const container =
document.getElementById("sessionList");

container.innerHTML="Loading...";

const q =
query(collection(db,"sessions"));

const snapshot =
await getDocs(q);

container.innerHTML="";

snapshot.forEach((d)=>{

const s = d.data();

container.innerHTML += `
<div class="sessionCard">

<h3>${s.title}</h3>

<p>Date: ${s.date}</p>

<p>Time:
${s.startTime}
-
${s.endTime}
</p>

<p>${s.description || ""}</p>

<button
class="deleteBtn"
onclick="deleteSession('${d.id}')">
Delete
</button>

</div>
`;

});

}

loadSessions();

</script>

</body>
</html>
