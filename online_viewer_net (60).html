
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BEST ERP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#FAF8F5;

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

.login-card{

width:100%;

max-width:420px;

background:white;

border:2px solid #DC2626;

box-shadow:8px 8px 0px #5B21B6;

padding:30px;
}

.logo-container{

    text-align:center;

    margin-bottom:15px;
}

.school-logo{

    width:120px;

    height:120px;

    object-fit:contain;

    display:block;

    margin:auto;
}

.school-name{

text-align:center;

margin-top:15px;

font-size:15px;

font-weight:600;

line-height:1.6;
}

.roles{

margin:25px 0;

text-align:center;

color:#666;

line-height:2;
}

.google-btn{

width:100%;

padding:16px;

border:none;

background:#DC2626;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;
}

.google-btn:hover{

opacity:.9;
}

.secure{

margin-top:20px;

text-align:center;

font-size:13px;

color:#777;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo-container">

    <img src="assets/logo.png"
         alt="BEST Logo"
         class="school-logo">

</div>


<div class="school-name">

International English School<br>

&<br>

PU College

</div>

<div class="roles">

Student • Parent<br>

Teacher • Office<br>

Principal

</div>

<button
class="google-btn"
id="googleLogin">

CONTINUE WITH GOOGLE

</button>

<div class="secure">

Secure ERP Platform

</div>

</div>

</body>

</html>
