<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Portal</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#2563eb;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

input{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
border:none;
background:#2563eb;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
border-top:1px solid #ddd;
}

.nav button{
flex:1;
background:white;
color:black;
border:none;
padding:15px;
}

img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
}
</style>
</head>

<body>

<div class="header">
<h2>Zenova Student Portal</h2>
</div>

<div class="container">

<div id="setupCard" class="card" style="display:none">

<h3>Complete Profile</h3>

<input id="name" placeholder="Student Name">

<input id="regno" placeholder="Register Number">

<input id="mobile" placeholder="Mobile Number">

<button onclick="saveProfile()">
Save Profile
</button>

</div>

<div id="homePage" style="display:none">

<div class="card">

<h2 id="welcome"></h2>

<h3 id="dayText"></h3>

</div>

<div class="card">

<h3>Today's Sessions</h3>

<div id="sessions"></div>

</div>

</div>

<div id="profilePage" style="display:none">

<div class="card">

<img id="photo">

<h3>Profile</h3>

<input id="editName">

<input id="editRegno">

<input id="editMobile">

<button onclick="updateProfile()">
Update Profile
</button>

</div>

</div>

</div>

<div class="nav">

<button onclick="showHome()">
🏠 Home
</button>

<button onclick="showProfile()">
👤 Profile
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
updateDoc,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyAkuoUAAr7zEQICxlnimpz1XUFKJA3hPA8",
authDomain:"best-f6d59.firebaseapp.com",
projectId:"best-f6d59",
storageBucket:"best-f6d59.firebasestorage.app",
messagingSenderId:"422817936552",
appId:"1:422817936552:web:6d8bfeb0efab2e6302fe9d",
measurementId:"G-QVZZK9T59X"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const uid =
localStorage.getItem("userEmail");

const userName =
localStorage.getItem("userName");

const userPhoto =
localStorage.getItem("userPhoto") || "";

window.showHome = ()=>{
document.getElementById("homePage").style.display="block";
document.getElementById("profilePage").style.display="none";
};

window.showProfile = async ()=>{

document.getElementById("homePage").style.display="none";
document.getElementById("profilePage").style.display="block";

const snap =
await getDoc(doc(db,"students",uid));

if(!snap.exists()) return;

const d = snap.data();

document.getElementById("photo").src =
userPhoto ||
"https://via.placeholder.com/100";

document.getElementById("editName").value =
d.name || "";

document.getElementById("editRegno").value =
d.regno || "";

document.getElementById("editMobile").value =
d.mobile || "";
};

window.logout = ()=>{

localStorage.clear();

window.location="index.html";

};

window.saveProfile = async ()=>{

const name =
document.getElementById("name").value;

const regno =
document.getElementById("regno").value;

const mobile =
document.getElementById("mobile").value;

await setDoc(
doc(db,"students",uid),
{
name,
regno,
mobile,
email:uid
}
);

loadStudent();

};

window.updateProfile = async ()=>{

await updateDoc(
doc(db,"students",uid),
{
name:
document.getElementById("editName").value,

regno:
document.getElementById("editRegno").value,

mobile:
document.getElementById("editMobile").value
}
);

alert("Profile Updated");

};

async function loadStudent(){

const snap =
await getDoc(doc(db,"students",uid));

if(!snap.exists()){

document.getElementById("setupCard")
.style.display="block";

return;
}

document.getElementById("setupCard")
.style.display="none";

document.getElementById("homePage")
.style.display="block";

const data = snap.data();

document.getElementById("welcome")
.innerHTML =
"Welcome "+data.name+" 👋";

const startDate =
new Date("2026-07-01");

const today =
new Date();

const day =
Math.floor(
(today-startDate)
/
(1000*60*60*24)
)+1;

document.getElementById("dayText")
.innerHTML =
"Day "+day;

loadSessions();

}

async function loadSessions(){

const div =
document.getElementById("sessions");

div.innerHTML="";

const snap =
await getDocs(
collection(db,"sessions")
);

snap.forEach((d)=>{

const s = d.data();

div.innerHTML += `
<div class="card">

<b>${s.title}</b>

<br><br>

${s.date}

<br>

${s.startTime} - ${s.endTime}

<br><br>

<button onclick="alert('Session Joining Module Next')">

Join Session

</button>

</div>
`;

});

}

loadStudent();

</script>

</body>
</html>
