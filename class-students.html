<html lang="en">

<head>

<title>Class Students</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#FAF8F5;
padding-bottom:80px;
}

.header{
padding:20px;
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:55px;
height:55px;
object-fit:contain;
}

.title h2{
color:#5B21B6;
}

.title p{
font-size:12px;
color:#666;
}

.stats{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:15px;
}

.card{

background:white;
padding:18px;
border:2px solid #DC2626;
box-shadow:5px 5px 0 #5B21B6;
}

.card h4{
font-size:13px;
color:#666;
margin-bottom:8px;
}

.card h2{
font-size:28px;
color:#5B21B6;
}

.search-wrap{
padding:15px;
}

.search{

width:100%;
padding:14px;
border:2px solid #DC2626;
font-size:15px;
}

.message-btn{

margin:15px;

width:calc(100% - 30px);

padding:16px;

border:none;

background:#DC2626;

color:white;

font-size:16px;

font-weight:700;

cursor:pointer;

box-shadow:5px 5px 0 #5B21B6;
}

.table-wrap{
padding:15px;
overflow:auto;
}

table{

width:100%;

border-collapse:collapse;

background:white;
}

th{

background:#5B21B6;

color:white;

padding:12px;

font-size:13px;
}

td{

padding:12px;

border-bottom:1px solid #ddd;

font-size:13px;
}

.student-link{

color:#111827;

text-decoration:none;

font-weight:600;
}

.present{

color:green;
font-weight:600;
}

.absent{

color:red;
font-weight:600;
}

.popup{

display:none;

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.5);

justify-content:center;
align-items:center;
}

.popup-content{

background:white;

width:90%;

max-width:450px;

padding:20px;
}

.popup-content h3{

margin-bottom:15px;
}

.popup-content input,
.popup-content textarea{

width:100%;

padding:12px;

margin-bottom:10px;

border:1px solid #ccc;
}

.send-btn{

width:100%;

padding:14px;

background:#DC2626;

border:none;

color:white;

font-weight:700;
}
.popup-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:15px;
}

.close-btn{

background:none;

border:none;

font-size:28px;

font-weight:700;

cursor:pointer;

color:#DC2626;

line-height:1;
}
  .cancel-btn{

width:100%;

padding:14px;

margin-top:10px;

background:white;

border:2px solid #DC2626;

color:#DC2626;

font-weight:700;

cursor:pointer;
  }
</style>

</head>

<body>

<div class="header">

Send Message To Entire Class

</button>

<div class="table-wrap">

<table>

<thead>

</tbody>

</div>

<div
class="popup"
id="messagePopup">

<div class="popup-content">

<div class="popup-header">

<h3>
Send Message To Class
</h3>

<button
class="close-btn"
onclick="closeMessage()">

✕

</button>

</div>

<input
type="text"
placeholder="Title">

<textarea
rows="5"
placeholder="Type your message">
</textarea>

<button
class="send-btn">

Send

</button>

</div>

</div>
<button
class="send-btn">

Send

</button>

<button
class="cancel-btn"
onclick="closeMessage()">

Cancel

</button>
<script>

function openMessage(){

document
.getElementById("messagePopup")
.style.display="flex";

}

window.onclick=function(e){

let popup=
document.getElementById("messagePopup");

if(e.target===popup){

popup.style.display="none";

}

}
function closeMessage(){

document
.getElementById("messagePopup")
.style.display="none";

}
</script>

</body>

</html>
