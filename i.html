
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BEST ERP Login</title>

<link href="https://fonts.googleapis.com/css2?family=Anton&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#FAF8F5;

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;
}

.login-card{

width:100%;

max-width:420px;

background:white;

border:2px solid #DC2626;

box-shadow:8px 8px 0px #5B21B6;

padding:30px;
}

.logo-container{

text-align:center;

margin-bottom:15px;
}

.school-logo{

width:120px;

height:120px;

object-fit:contain;
}

.erp-title{

font-family:'Anton',sans-serif;

font-size:52px;

color:#5B21B6;

text-align:center;
}

.erp-subtitle{

text-align:center;

font-weight:600;

line-height:1.8;

margin-top:10px;
}

.roles{

margin:25px 0;

text-align:center;

color:#666;

line-height:2;
}

.google-btn{

width:100%;

padding:16px;

border:none;

background:#DC2626;

color:white;

font-weight:700;

font-size:16px;

cursor:pointer;
}

.google-btn:hover{

opacity:.9;
}

.secure{

margin-top:20px;

text-align:center;

font-size:13px;

color:#777;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo-container">

<img src="assets/logo.png"
class="school-logo">

</div>

<h1 class="erp-title">
BEST ERP
</h1>

<p class="erp-subtitle">

International English School<br>
&<br>
PU College

</p>

<div class="roles">

Student • Parent<br>
Teacher • Office<br>
Principal

</div>

<button
id="googleLogin"
class="google-btn">

CONTINUE WITH GOOGLE

</button>

<div class="secure">

Secure ERP Platform

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAkuoUAAr7zEQICxlnimpz1XUFKJA3hPA8",

authDomain: "best-f6d59.firebaseapp.com",

projectId: "best-f6d59",

storageBucket: "best-f6d59.firebasestorage.app",

messagingSenderId: "422817936552",

appId: "1:422817936552:web:6d8bfeb0efab2e6302fe9d",

measurementId: "G-QVZZK9T59X"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

document
.getElementById("googleLogin")
.addEventListener("click", async()=>{

await signInWithRedirect(auth, provider);

});

getRedirectResult(auth)
.catch((error)=>{

console.error(error);

alert(error.message);

});

onAuthStateChanged(auth, async(user)=>{

if(!user) return;

console.log("UID:", user.uid);

try{

const userRef =
doc(db,"users",user.uid);

const userDoc =
await getDoc(userRef);

if(!userDoc.exists()){

alert(
"User not found in Firestore"
);

return;

}

const role =
userDoc.data().role;

if(role==="principal"){

window.location.href =
"principal.html";

}

else if(role==="teacher"){

window.location.href =
"teacher.html";

}

else if(role==="parent"){

window.location.href =
"parent.html";

}

else if(role==="student"){

window.location.href =
"student.html";

}

else if(role==="office"){

window.location.href =
"office.html";

}

}
catch(error){

console.error(error);

alert(error.message);

}

});

</script>

</body>
</html>
